<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate personalized invitation images from a guest list and template.">
  <title>Invitation Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="dashboard" aria-label="Invitation generator">
      <div class="controls-panel">
        <header class="hero" aria-labelledby="page-title">
          <div class="eyebrow"><span></span> Invitation maker</div>
          <h1 id="page-title">Personalized invitations,<br><em>beautifully simple.</em></h1>
          <p>Upload your guest list and design, then generate an invitation for every name.</p>
        </header>

        <form id="generator-form">
          <div class="upload-grid">
            <label class="upload-card" for="guest-list">
              <span class="icon-wrap" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none"><path d="M8 3h5l4 4v14H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M13 3v5h5M9 13h6M9 17h4"/></svg>
              </span>
              <span class="upload-copy">
                <strong>Guest list</strong>
                <span id="guest-file-name">Choose guest_list.txt</span>
              </span>
              <span class="guest-count" id="name-count" aria-live="polite"><strong>0</strong><small>names</small></span>
              <input id="guest-list" name="guest_list" type="file" accept=".txt,text/plain" required>
            </label>

            <label class="upload-card" for="template-image">
              <span class="icon-wrap" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="m4 17 4-4 3 3 3-3 6 5"/></svg>
              </span>
              <span class="upload-copy">
                <strong>Invitation template</strong>
                <span id="template-file-name">Choose invitation_template.png</span>
              </span>
              <span class="choose-button">Browse</span>
              <input id="template-image" name="invitation_template" type="file" accept=".png,image/png" required>
            </label>
          </div>
          <p class="upload-error" id="upload-error" role="alert" hidden></p>

          <div class="action-area" aria-live="polite">
            <button class="generate-button" id="generate-button" type="submit">
              <span class="button-label">Generate Invitations</span>
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none"><path d="m9 18 6-6-6-6"/></svg>
            </button>

            <div class="action-status" id="result" hidden>
              <span class="spinner" aria-hidden="true"></span>
              <strong id="result-title"></strong>
              <button class="retry-button" id="retry-button" type="button" hidden>Generate Again</button>
            </div>
          </div>
          <p class="form-note">Files are previewed locally and are not uploaded yet.</p>
        </form>
      </div>

      <section class="preview-panel" id="preview-panel" aria-labelledby="preview-title">
        <div class="image-preview" id="image-preview">
          <img id="template-preview" alt="Uploaded invitation template preview" hidden>
          <div class="preview-placeholder" id="preview-placeholder">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="m4 17 4-4 3 3 3-3 6 5"/></svg>
            <strong>Nothing to preview yet</strong>
            <span>Choose an invitation_template.png from the controls.</span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
